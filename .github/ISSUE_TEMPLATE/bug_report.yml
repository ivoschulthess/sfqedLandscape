name: Bug report
description: Report a problem with the code, notebooks, plots, or documentation.
title: "[Bug]: "
labels:
  - bug

body:
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Plotting code
        - Data parser or validation
        - Notebook
        - Generated plot
        - Documentation
        - Binder environment
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Description of the problem
      description: Explain what went wrong.
      placeholder: |
        The NCS notebook fails when reading...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the commands or actions needed to reproduce the problem.
      placeholder: |
        1. Open notebooks/NCS.ipynb
        2. Run all cells
        3. The error occurs in cell ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include the complete error message if available.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide relevant details such as operating system, Python version,
        package versions, Binder, or local installation.
      placeholder: |
        Python 3.12
        matplotlib 3.9
        PyYAML 6.0

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste error messages or logs here.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots, links, or other relevant information.
